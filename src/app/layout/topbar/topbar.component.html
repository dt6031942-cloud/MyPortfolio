<div class="topbar">
    <div class="left-top">
    <i class="fas fa-bars menu-btn" (click)="uiService.toggleSidebar()" style="cursor: pointer;"></i>
    <h3 class="title">Enterprise Overview</h3>
</div>

    <div class="right-top">
        <div class="icon-box">
            <i class="fas fa-bell"></i>
            <span class="badge">3</span>
        </div>
        <div class="icon-box">
            <i class="fas fa-paper-plane"></i>
            <span class="badge">9</span>
        </div>
        <div class="profile" (click)="toggleMenu()" style="position: relative; cursor: pointer;">
            <img src="https://i.pravatar.cc/150?img=3" alt="Admin">
            <div class="profile-menu" *ngIf="menuOpen">
                <button class="logout" (click)="logout($event)">Logout</button>
            </div>
        </div>
    </div>
</div>
